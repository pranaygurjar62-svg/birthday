<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make a Wish, Gamma 🎉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.2/confetti.browser.min.js"></script>
</head>
<body>

<div class="bg-blobs">
  <div class="stars" id="stars"></div>
  <div id="balloons"></div>
</div>

<nav class="topnav">
  <a href="index.html">Home</a>
  <a href="wishes.html">Wishes</a>
  <a href="cake.html" class="active">Make a Wish</a>
</nav>

<main>
  <section class="cake-zone">
    <h2>make a wish, gamma 🎉</h2>
    <p class="hint">tap the cake to blow out the candles</p>
    <svg id="cake" width="260" height="220" viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg">
      <!-- plate -->
      <ellipse cx="130" cy="200" rx="110" ry="14" fill="#2a1740"/>
      <!-- base layer -->
      <rect x="35" y="150" width="190" height="45" rx="10" fill="#ff3d7f"/>
      <rect x="35" y="150" width="190" height="12" rx="6" fill="#ff6d9c"/>
      <!-- middle layer -->
      <rect x="55" y="110" width="150" height="45" rx="10" fill="#9b5cff"/>
      <rect x="55" y="110" width="150" height="12" rx="6" fill="#b585ff"/>
      <!-- top layer -->
      <rect x="80" y="75" width="100" height="42" rx="10" fill="#ffd23f"/>
      <rect x="80" y="75" width="100" height="12" rx="6" fill="#ffe089"/>
      <!-- sprinkles -->
      <circle cx="70" cy="170" r="3" fill="#ffd23f"/>
      <circle cx="100" cy="175" r="3" fill="#2fe6b4"/>
      <circle cx="150" cy="168" r="3" fill="#fff6ea"/>
      <circle cx="190" cy="172" r="3" fill="#ffd23f"/>
      <circle cx="90" cy="130" r="3" fill="#ff3d7f"/>
      <circle cx="150" cy="135" r="3" fill="#fff6ea"/>
      <circle cx="180" cy="128" r="3" fill="#2fe6b4"/>
      <!-- candles -->
      <g id="candles">
        <rect x="100" y="45" width="7" height="32" rx="2" fill="#fff6ea"/>
        <rect x="127" y="38" width="7" height="39" rx="2" fill="#fff6ea"/>
        <rect x="154" y="45" width="7" height="32" rx="2" fill="#fff6ea"/>
        <g class="flame" data-flame="1"><ellipse cx="103.5" cy="40" rx="5" ry="9" fill="#ffd23f"/><ellipse cx="103.5" cy="40" rx="2.4" ry="5" fill="#ff8a3d"/></g>
        <g class="flame" data-flame="2"><ellipse cx="130.5" cy="33" rx="5" ry="9" fill="#ffd23f"/><ellipse cx="130.5" cy="33" rx="2.4" ry="5" fill="#ff8a3d"/></g>
        <g class="flame" data-flame="3"><ellipse cx="157.5" cy="40" rx="5" ry="9" fill="#ffd23f"/><ellipse cx="157.5" cy="40" rx="2.4" ry="5" fill="#ff8a3d"/></g>
      </g>
    </svg>
    <p class="wish-line" id="wishLine">wish made. the universe has been notified 🌙</p>
  </section>
</main>

<footer>
  made with a little <span class="heart">♥</span> and zero regrets, for gamma
</footer>

<script src="script.js"></script>
</body>
</html>
